<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-s: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d2991d; --red: #f85149;
    --radius: 8px;
  }
  body {
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',system-ui,sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; position: sticky; top: 0; z-index: 100; height: 48px;
  }
  .topbar-brand { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-host { font-size: 12px; color: var(--text-s); background: rgba(139,148,158,0.12); padding: 4px 10px; border-radius: 6px; font-family: 'SF Mono',monospace; }
  .app { max-width: 1000px; margin: 0 auto; padding: 24px; }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-s); margin-bottom: 20px; padding: 8px 0;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }
  .status-dot.loading { background: var(--orange); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .section-title { font-size: 13px; font-weight: 600; color: var(--text-s); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.4px; }

  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .card-label { font-size: 10px; color: var(--text-s); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .card-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card-value.green { color: var(--green); }
  .card-value.orange { color: var(--orange); }
  .card-value.accent { color: var(--accent); }
  .card-sub { font-size: 12px; color: var(--text-s); margin-top: 2px; }

  .svc-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .svc-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .svc-badge.running { background: rgba(63,185,80,0.15); color: var(--green); }
  .svc-badge.stopped { background: rgba(248,81,73,0.12); color: var(--red); }
  .svc-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; border-bottom: 1px solid rgba(48,54,61,0.3); }
  .svc-row:last-child { border-bottom: none; }
  .svc-row-label { color: var(--text-s); }
  .svc-row-value { font-weight: 600; font-variant-numeric: tabular-nums; }

  .actions { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
    cursor: pointer; transition: all 0.12s; font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { background: rgba(88,166,255,0.1); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .bal-val { font-size: 28px; font-weight: 700; color: var(--green); }
  .bal-status { font-size: 12px; color: var(--text-s); margin-top: 2px; }
  .bal-err { color: var(--red); font-size: 12px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px; font-size: 13px;
    z-index: 1000; opacity: 0; transition: opacity 0.25s;
  }
  .toast.show { opacity: 1; }

  @media(max-width:640px) {
    .app { padding: 16px; }
    .topbar { padding: 0 16px; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .card-value { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Control Panel</span>
  <span class="topbar-host" id="hostDisplay">--</span>
</div>

<div class="app">
  <div class="status-bar">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">加载中...</span>
  </div>

  <div class="section-title">系统状态</div>
  <div class="grid-4" id="sysGrid">
    <div class="card"><div class="card-label">运行时间</div><div class="card-value" id="valUptime">--</div></div>
    <div class="card"><div class="card-label">负载</div><div class="card-value" id="valLoad">--</div></div>
    <div class="card"><div class="card-label">磁盘</div><div class="card-value orange" id="valDisk">--</div><div class="card-sub" id="subDisk"></div></div>
    <div class="card"><div class="card-label">内存</div><div class="card-value accent" id="valMem">--</div><div class="card-sub" id="subMem"></div></div>
    <div class="card"><div class="card-label">网络流量</div><div class="card-value accent" id="valNetRx">--</div><div class="card-sub" id="valNetTx"></div></div>
  </div>

  <div class="section-title">服务</div>
  <div class="grid-3" id="svcGrid">
    <div class="card" id="svcAssistant">
      <div class="svc-name">Assistant <span class="svc-badge" id="badgeAssistant">...</span></div>
      <div class="svc-row"><span class="svc-row-label">端口</span><span class="svc-row-value">18874</span></div>
      <div class="svc-row"><span class="svc-row-label">进程 ID</span><span class="svc-row-value" id="svcAsstPid">--</span></div>
    </div>
    <div class="card" id="svcShadowsocks">
      <div class="svc-name">Shadowsocks <span class="svc-badge" id="badgeSS">...</span></div>
      <div class="svc-row"><span class="svc-row-label">类型</span><span class="svc-row-value">Rust</span></div>
      <div class="svc-row"><span class="svc-row-label">状态</span><span class="svc-row-value" id="svcSSStatus">--</span></div>
    </div>
    <div class="card" id="svcTGBot">
      <div class="svc-name">Telegram Bot <span class="svc-badge" id="badgeTG">...</span></div>
      <div class="svc-row"><span class="svc-row-label">状态</span><span class="svc-row-value" id="svcTGStatus">--</span></div>
      <div class="svc-row"><span class="svc-row-label">用户名</span><span class="svc-row-value">@Weihang10_bot</span></div>
      <div class="svc-row" style="border-bottom:none;padding-top:8px">
        <div class="actions" style="width:100%">
          <button class="btn btn-sm" onclick="execAction('start bot')" style="flex:1">▶ 启动</button>
          <button class="btn btn-sm danger" onclick="execAction('stop bot')" style="flex:1">⏹ 停止</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">DeepSeek 余额</div>
  <div class="grid-2" id="dsGrid">
    <div class="card">
      <div class="card-label">账户余额</div>
      <div class="bal-val" id="balVal">--</div>
      <div class="bal-status" id="balStatus">--</div>
    </div>
    <div class="card">
      <div class="card-label">快捷操作</div>
      <div class="actions">
        <button class="btn btn-sm" onclick="execAction('restart asst')">♻ 重启 Assistant</button>
        <button class="btn btn-sm" onclick="execAction('start bot')">▶ 启动 Bot</button>
        <button class="btn btn-sm danger" onclick="execAction('stop bot')">⏹ 停止 Bot</button>
        <button class="btn btn-sm" onclick="execAction('disk usage')">📊 磁盘分析</button>
        <button class="btn btn-sm" onclick="execAction('logs')">📋 查看日志</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let refreshTimer = null;

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function fmtTime(secs) {
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  let parts = [];
  if (d > 0) parts.push(d + 'd');
  if (h > 0 || d > 0) parts.push(h + 'h');
  parts.push(m + 'm');
  return parts.join(' ');
}

function fmtBytes(v) {
  if (!v) return '0';
  v = parseInt(v);
  if (v >= 1073741824) return (v/1073741824).toFixed(1)+'GB';
  if (v >= 1048576) return (v/1048576).toFixed(1)+'MB';
  if (v >= 1024) return (v/1024).toFixed(1)+'KB';
  return v+'B';
}

function showToast(msg, isErr) {
  const t = $('toast');
  t.textContent = '✓ ' + msg;
  t.style.color = isErr ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 3000);
}

function setStatus(ok, msg) {
  const dot = $('statusDot'), txt = $('statusText');
  dot.className = 'status-dot';
  if (ok === null) {
    dot.classList.add('loading');
    txt.textContent = '加载中...';
  } else if (ok) {
    dot.classList.add('ok');
    txt.textContent = msg;
  } else {
    dot.classList.add('err');
    txt.textContent = msg || '加载失败';
  }
}

async function loadStatus() {
  setStatus(null);
  try {
    const [st, bal] = await Promise.all([
      fetchJSON('/api/status'),
      fetchJSON('/api/balance').catch(() => null)
    ]);

    // Host
    $('hostDisplay').textContent = st.hostname;

    // System stats
    $('valUptime').textContent = fmtTime(parseInt(st.uptime_secs) || 0);
    $('valLoad').textContent = st.load;
    $('valDisk').textContent = st.disk;
    
    const memVal = $('valMem');
    const memPct = parseInt(st.memory_pct || 0);
    memVal.textContent = memPct + '%';
    memVal.className = 'card-value' + (memPct > 80 ? ' orange' : memPct > 50 ? ' accent' : '');

    // Network
    const rx = parseInt(st.network_rx) || 0;
    const tx = parseInt(st.network_tx) || 0;
    $('valNetRx').textContent = fmtBytes(rx);
    $('valNetTx').textContent = '↑ ' + fmtBytes(tx);

    // Services
    const svcs = st.services;
    for (const [name, status] of Object.entries(svcs)) {
      const badgeMap = { assistant: "badgeAssistant", shadowsocks: "badgeSS", tg_bot: "badgeTG" };
      const badge = $(badgeMap[name]);
      if (badge) {
        badge.textContent = status;
        badge.className = 'svc-badge ' + status;
      }
    }

    // Balance
    if (bal && bal.balance_infos?.length > 0) {
      const info = bal.balance_infos[0];
      const b = parseFloat(info.total_balance);
      $('balVal').textContent = '¥' + b.toFixed(2);
      $('balStatus').textContent = '充值 ¥' + info.topped_up_balance + ' · ' + (bal.is_available !== false ? '正常' : '异常');
    } else if (bal) {
      $('balVal').textContent = '--';
      $('balStatus').textContent = bal.error?.message || '获取失败';
    } else {
      $('balVal').textContent = '--';
      $('balStatus').textContent = 'API Key 无效';
    }

    setStatus(true, new Date().toLocaleTimeString('zh-CN') + ' 已更新');
  } catch (e) {
    setStatus(false, '加载失败: ' + e.message);
  }
}

async function execAction(action) {
  const actions = {
    'restart asst': 'sudo systemctl restart dashboard.service',
    'start bot': 'cd /home/ubuntu && nohup python3 -u tg_bot.py > /tmp/tg_bot.log 2>&1 &',
    'stop bot': 'pkill -f "tg_bot.py" 2>/dev/null; echo "stopped"',
    'disk usage': 'du -sh /home/ubuntu/* 2>/dev/null | sort -rh | head -10',
    'logs': 'tail -20 /tmp/assistant.log 2>/dev/null || echo "无日志"',
  };
  const cmd = actions[action];
  if (!cmd) return;

  showToast('执行中...');
  try {
    const r = await fetch('/api/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd }),
    });
    const data = await r.json();
    if (data.output) {
      showToast(action + ' 完成');
    } else {
      showToast(action + ' 成功', false);
    }
    // Refresh after action
    setTimeout(loadStatus, 2000);
  } catch (e) {
    showToast(action + ' 失败: ' + e.message, true);
  }
}

// Auto refresh
loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
